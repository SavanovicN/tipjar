name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test-contracts:
    name: Test Smart Contracts
    runs-on: ubuntu-22.04  # Lightweight, specific version
    defaults:
      run:
        working-directory: ./hardhat

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Install Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run Foundry tests
        run: forge test --match-contract TipJarTest

      - name: Run Foundry tests with gas report
        run: forge test --match-contract TipJarTest --gas-report

      - name: Compile contracts
        run: forge build

  lint-frontend:
    name: Lint Frontend
    runs-on: ubuntu-22.04  # Lightweight, specific version
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run Biome lint
        run: bunx @biomejs/biome check .

      - name: Check formatting
        run: bunx @biomejs/biome format --check .

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-22.04  # Lightweight, specific version
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build Next.js app
        run: bun run build

